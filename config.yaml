keywords:
  - in vitro diagnostic
  - IVD
  - companion diagnostic
  - point-of-care
  - PCR
  - molecular diagnostics
  - veterinary diagnostics
  - zoonotic
  - Anvisa
  - FDA

# RSS diretos: idealmente, use URLs que sejam feeds RSS "de verdade".
# Alguns URLs abaixo podem ser páginas que listam feeds; se não vier item, troque pelo feed específico.
rss_sources:
  - name: GenomeWeb
    url: https://www.genomeweb.com/rss-feeds
  - name: FierceBiotech
    url: https://www.fiercebiotech.com/fiercebiotechcom/rss-feeds
  - name: The Scientist
    url: https://www.the-scientist.com/rss
  - name: AVMA
    url: https://www.avma.org/news/rss-feeds
  - name: JVDI (SAGE)
    url: https://journals.sagepub.com/connected/vdi

pubmed_queries:
  - name: Human IVD / performance
    query: '"in vitro diagnostic"[Title/Abstract] OR IVD OR "companion diagnostic" OR "point-of-care"'
  - name: Veterinary diagnostics
    query: 'veterinary[Title/Abstract] AND (diagnostic OR diagnostics OR PCR OR serology OR "point-of-care")'

news_queries:
  # Brasil (pt-BR)
  - name: Brasil IVD
    q: '(diagnóstico OR IVD OR "teste rápido" OR PCR OR "diagnóstico molecular") (Anvisa OR laboratório OR "in vitro")'
    hl: pt-BR
    gl: BR
    ceid: BR:pt-419

  - name: Brasil Veterinário
    q: '(diagnóstico veterinário OR zoonose OR "teste rápido" OR PCR) (laboratório OR vigilância)'
    hl: pt-BR
    gl: BR
    ceid: BR:pt-419

  # Global (en)
  - name: Global IVD
    q: '(in vitro diagnostic OR IVD OR "companion diagnostic" OR "point-of-care" OR PCR) (FDA OR CE-IVD OR IVDR OR "clinical performance")'
    hl: en-US
    gl: US
    ceid: US:en

  - name: Global Veterinary
    q: '(veterinary diagnostics OR zoonotic OR "point-of-care" OR PCR) (IDEXX OR Zoetis OR "veterinary lab")'
    hl: en-US
    gl: US
    ceid: US:en

stocks:
  enabled: false
  provider: alphavantage
  symbols:
    # humano (exemplos)
    - IDXX   # IDEXX (vet forte)
    - ZTS    # Zoetis (vet)
    - DGX    # Quest Diagnostics
    - LH     # Labcorp
    - TMO    # Thermo Fisher

limits:
  # Quantos itens totais entram no ranking final
  max_items_total: 25

  # Quantos itens vão para o resumo com IA (se ai.enabled=true)
  max_items_for_gemini: 15

  # (opcional) Limite por fonte antes do ranking (evita Google News dominar)
  # Seu código atual ainda não usa isso, mas fica pronto para o próximo passo.
  max_per_source: 12

  # (opcional) Quantos links vão no Telegram (se você decidir ler do config depois)
  telegram_links: 20

ai:
  enabled: false
  model: gemini-2.0-flash

# (opcional) Lista de empresas para "boost" no ranking (quando você quiser refinar o score)
# Seu código atual ainda não usa isso.
watchlist:
  companies:
    - Roche
    - Abbott
    - Danaher
    - Beckman Coulter
    - bioMérieux
    - Thermo Fisher
    - Illumina
    - Siemens Healthineers
    - QuidelOrtho
    - BD
    - IDEXX
    - Zoetis
