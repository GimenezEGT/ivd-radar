br:
  - name: BR Macro-Ecossistemas e Governança
    q: '("ecossistema de saúde" OR "plataforma de saúde" OR "sistema de saúde" OR "infraestrutura de saúde" OR "governança em saúde" OR "modelo assistencial")'

  - name: BR Atenção Hospitalar
    q: '("hospital" OR "hospital geral" OR "hospital universitário" OR "hospital privado" OR "hospital público" OR "rede hospitalar" OR "setor hospitalar" OR "sistema hospitalar")'

  - name: BR Atenção Ambulatorial e Primária
    q: '("clínica médica" OR "clínica especializada" OR "clínica popular" OR "centro de saúde" OR "policlínica" OR "unidade básica de saúde" OR "UBS")'

  - name: BR Urgência e Emergência
    q: '("pronto atendimento" OR "pronto socorro" OR "unidade de emergência" OR "hospital de campanha")'

  - name: BR Telemedicina e Saúde Digital
    q: '("saúde digital" OR "telemedicina" OR "teleconsulta" OR "telemonitoramento" OR "teleassistência" OR "hospital digital" OR "monitoramento remoto")'

  - name: BR Corpo Clínico Médico
    q: '("médico" OR "médico especialista" OR "médico generalista" OR "medicina interna" OR "medicina de família" OR "medicina preventiva")'

  - name: BR Equipe Multidisciplinar
    q: '("enfermeiro" OR "técnico de enfermagem" OR "biomédico" OR "farmacêutico" OR "dentista" OR "psicólogo" OR "nutricionista" OR "fisioterapeuta" OR "fonoaudiólogo")'

  - name: BR Especialidades Clínicas
    q: '("cardiologia" OR "neurologia" OR "pediatria" OR "ginecologia" OR "obstetrícia" OR "dermatologia" OR "endocrinologia" OR "gastroenterologia" OR "hepatologia" OR "nefrologia" OR "urologia" OR "pneumologia" OR "reumatologia" OR "geriatria")'

  - name: BR Especialidades Cirúrgicas
    q: '("cirurgia geral" OR "cirurgia plástica" OR "cirurgia cardiovascular" OR "cirurgia oncológica" OR "anestesiologia" OR "centro cirúrgico")'

  - name: BR Oncologia e Neoplasias
    q: '("oncologia" OR "câncer" OR "tumor" OR "neoplasia")'

  - name: BR Doenças Crônicas e Metabólicas
    q: '("doença crônica" OR "diabetes" OR "hipertensão" OR "obesidade" OR "insuficiência cardíaca" OR "AVC" OR "infarto" OR "asma" OR "DPOC" OR "insuficiência renal")'

  - name: BR Doenças Infecciosas
    q: '("doença infecciosa" OR "hepatite" OR "HIV" OR "AIDS" OR "tuberculose" OR "dengue" OR "zika" OR "covid" OR "influenza" OR "septicemia")'

  - name: BR Saúde Mental e Neurodegenerativas
    q: '("transtorno mental" OR "depressão" OR "ansiedade" OR "doença neurodegenerativa")'

  - name: BR Diagnóstico por Imagem
    q: '("exame de imagem" OR "raio X" OR "ultrassom" OR "tomografia" OR "ressonância magnética" OR "PET scan" OR "endoscopia" OR "colonoscopia")'

  - name: BR Diagnóstico Laboratorial
    q: '("laboratório clínico" OR "exame laboratorial" OR "análise clínica" OR "teste diagnóstico" OR "hemograma" OR "citologia" OR "biópsia" OR "triagem")'

  - name: BR Genômica e Diagnóstico Molecular
    q: '("diagnóstico molecular" OR "teste molecular" OR "PCR" OR "RT-PCR" OR "sequenciamento genético" OR "painel genético" OR "biomarcador")'

  - name: BR Terapias Avançadas
    q: '("terapia gênica" OR "terapia celular" OR "terapia imunológica" OR "imunoterapia" OR "terapia alvo" OR "terapia regenerativa" OR "medicina personalizada" OR "medicina de precisão")'

  - name: BR Reabilitação e Cuidados Paliativos
    q: '("reabilitação" OR "fisioterapia" OR "terapia ocupacional" OR "tratamento paliativo" OR "cuidados paliativos")'

  - name: BR Farmacêutica Tradicional
    q: '("medicamento" OR "fármaco" OR "droga terapêutica" OR "medicamento genérico" OR "antibiótico" OR "antiviral" OR "anti-inflamatório" OR "analgésico" OR "farmacologia")'

  - name: BR Biofármacos e Vacinas
    q: '("medicamento biológico" OR "medicamento biossimilar" OR "vacina" OR "imunizante" OR "biofármaco" OR "bioprodução")'

  - name: BR Pesquisa Clínica e Biomédica
    q: '("pesquisa clínica" OR "ensaio clínico" OR "pesquisa biomédica" OR "medicina translacional" OR "cultura celular" OR "células-tronco" OR "biobanco" OR "pipeline farmacêutico")'

  - name: BR Dispositivos e Implantes (MedTech)
    q: '("dispositivo médico" OR "equipamento médico" OR "tecnologia médica" OR "instrumento cirúrgico" OR "marcapasso" OR "stent" OR "prótese" OR "implante" OR "ventilador pulmonar")'

  - name: BR Inteligência Artificial e Analytics
    q: '("inteligência artificial médica" OR "IA em saúde" OR "machine learning médico" OR "analytics em saúde" OR "big data em saúde" OR "bioinformática")'

  - name: BR Gestão de Dados em Saúde
    q: '("prontuário eletrônico" OR "EHR" OR "EMR" OR "interoperabilidade em saúde" OR "dados de saúde")'

  - name: BR Pagadores e Planos de Saúde
    q: '("operadora de saúde" OR "plano de saúde" OR "seguro saúde" OR "rede credenciada" OR "beneficiário" OR "sinistralidade")'

  - name: BR Modelos de Remuneração e Gestão
    q: '("gestão hospitalar" OR "economia da saúde" OR "financiamento da saúde" OR "value-based care" OR "capitation" OR "pagamento por serviço" OR "gestão populacional")'

  - name: BR Fusões, Aquisições e Mercado (M&A)
    q: '("holding de saúde" OR "consolidação do setor" OR "fusão de empresas de saúde" OR "aquisição de hospital" OR "parceria estratégica em saúde" OR "joint venture em saúde" OR "spin-off de saúde" OR "verticalização da saúde")'

  - name: BR Regulação e Compliance
    q: '("regulação sanitária" OR "agência reguladora" OR "ANVISA" OR "vigilância sanitária" OR "farmacovigilância" OR "registro sanitário" OR "compliance em saúde")'

  - name: BR Epidemiologia e Saúde Pública
    q: '("saúde pública" OR "epidemiologia" OR "vigilância epidemiológica" OR "pandemia" OR "endemia" OR "controle de doenças" OR "cobertura vacinal" OR "mortalidade" OR "morbidade")'

